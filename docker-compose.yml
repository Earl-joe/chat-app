
services:

  backend:
    build: ./backend
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  nginx:
    build: ./nginx
    ports:
      - "80:80"

    depends_on:
      - frontend
      - backend
